<!DOCTYPE html>
<html>
<head>
  <title>Canvas Legacy: Purgatory</title>
  <link rel="icon" type="image/x-icon" href="./images/favicon.ico">
  <style>
  body {
    margin: 0;
    padding: 20px;
    font-family: Arial, sans-serif;
    font-size: 10px;
  }
#bankContainer {
  display: none;          /* hidden by default */
  position: fixed;        /* stick to viewport */
  top: 10px;              /* distance from top */
  left: 50%;              /* center horizontally */
  transform: translateX(-50%); /* perfect horizontal centering */
  background: #222;
  border: 2px solid #555;
  padding: 10px;
  z-index: 999;
  max-height: 45vh;       /* vertical scroll limit */
  overflow-y: auto;       /* vertical scroll only */
  overflow-x: hidden;     /* no horizontal scroll */
}
#bankContainer button#bankClose {
  position: absolute;
  top: 4px;
  right: 4px;
  padding: 2px 6px;
  cursor: pointer;
  z-index: 10; /* above the bank content */
}
  #page {
  width: fit-content;
  margin: 0 auto;
  }
  #disp {
    width: 640px;
    height: 320px;
    border: 1px solid black;
  }
  #palette {
    border: 1px solid black;
  }
  #messages {
    list-style-type: none;
    margin: 0;
    padding: 0;
    margin-bottom: 20px;
    border: 1px solid #000000;
    padding: 5px;
    height: 100px;
    width: 260px;
    overflow-y: auto;
    overflow-x: hidden;
    max-width: 100%;
    overflow-wrap: anywhere;

    white-space: pre-wrap;
    background: "#ffffff";
    }
    #messages li {
      padding: 5px 16px;
      border-bottom: 1px solid #eee;
      display: block;
      max-width: 100%;
      overflow-wrap: anywhere;
      word-break: break-all;
      white-space: pre-wrap;
    }
    #messages li:last-child {
      border-bottom: none;
    }
    #form {
      display: flex;
      margin-top: 10px;
      background: "#ffffff";
    }
    #input {
      padding: 5px;
      font-size: 10px;
      width: 220px;
    }
    button {
      padding: 10px 20px;
      background: rgb(68, 68, 68);
      color: white;
      border: none;
      cursor: pointer;
      margin-left: 10px;
      }
    .chat-tab {
      padding: 2px 8px;
      font-size: 12px;
      margin-left: 2px;
      background: rgb(50,50,50);
    }
    .settings-tab {
      padding: 2px 8px;
      font-size: 12px;
      margin-left: 2px;
      background: rgb(50,50,50);
    }
    .chat-tab.active {
      background: rgb(120,120,120);
    }

    button:hover {
      background: rgb(133, 133, 133);
    }
    #chat-column {
      width: 300px;
    }

    #bottom-row {
      display: flex;
      width: 640px;
      align-items: flex-start;
    }

    #side-column {
      margin-left: auto;
      display: flex;
      flex-direction: row;
      justify-content: flex-end;
      align-items: flex-end;
      /*gap: 10px;*/
      outline: 1px solid black;
    }
  </style>
</head>
  <div id="bankContainer">
  <button id="bankClose">✕</button>

  <!-- Bank grid -->
  <div id="bankGrid" style="display:grid; grid-template-columns:repeat(8,48px); grid-auto-rows:32px; gap:4px; margin-top:8px; width:100%; max-height:60vh; overflow-y:auto;"></div>

  <!-- Inventory grid -->
  <div id="invGrid" style="display:grid; grid-template-columns:repeat(8,48px); grid-auto-rows:48px; gap:4px; margin-top:8px; width:100%; max-height:60vh; overflow-y:auto;"></div>

  <!-- Controls -->
  <div id="bankControls" style="margin-top:8px;">
    <input type="number" id="bankAmount" value="1" min="1">
    <button id="withdrawBtn">Withdraw</button>
    <button id="depositBtn">Deposit</button>
  </div>
  </div>

<body style="background-color:black">
  <div id="page">
<canvas id="disp" width="640" height="320"></canvas>
<div id="bottom-row" style="background-color:rgb(0, 0, 0)">
  <div id="chat-column">
    <ul id="messages" style="color:white; font-family: Consolas, Courier New, monospace;"></ul>
<button class="chat-tab" onclick="filterMessages('all')">all</button>
<button class="chat-tab" onclick="filterMessages('chat')">chat</button>
<button class="chat-tab" onclick="filterMessages('game')">game</button>
<button class="chat-tab" onclick="filterMessages('trade')">trade</button>
    <form id="form" action="#">
      <input id="input" autocomplete="off" placeholder="Chat..." />
      <button>Send</button>
    </form>
  </div>
  <div id="side-column">
    <div>
      <canvas id="invDisp" width="256" height="128"></canvas>
      <div style="display:inline-flex; gap:4px;">
      <button class="settings-tab" id="logoutBtn" onclick="logout()">Logout</button>
      <button class="settings-tab" id="settingsBtn" onclick="settings()">Settings</button>
      <button class="settings-tab" id="stuckBtn" onclick="playerStuck()">Stuck?</button>
      </div>
    </div>
    </div>
  </div>
  </div>
  <script src="/socket.io/socket.io.js"></script>
  <script src="base_tiles.js"></script>
  <script src="index.js"></script>
  <script>
document.querySelectorAll(".chat-tab").forEach(b => {
  b.addEventListener("click", () => {
    // remove active from all
    document.querySelectorAll(".chat-tab").forEach(btn => btn.classList.remove("active"));
    
    // add active to the clicked one
    b.classList.add("active");
    
  });
});
window.addEventListener("DOMContentLoaded", () => {
  const line = document.createElement("div");
  line.dataset.type = "game";                  // optional, for filtering
  line.innerHTML = `<strong><span style='color: teal'>PSA</span>: Canvas Legacy: Purgatory is in early alpha and riddled with bugs :)
> </strong> <span style='color: blue' class="chat-link" data-action="openWebsite" data-url="https://discord.com/channels/307205327659597856/1470686194240065648"><u>Discord</u></span>`;

  const messages = document.getElementById("messages");
  messages.append(line);
  messages.scrollTop = messages.scrollHeight;    // scroll to bottom
});
  </script>
</div>
</body>
</html>
