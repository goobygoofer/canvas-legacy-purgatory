<!DOCTYPE html>
<html>
<body>
  <h1>Camera</h1>
  <video id="video" autoplay playsinline></video>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io("/camera", {
      reconnection: true,
      reconnectionAttempts: Infinity,
      reconnectionDelay: 1000,
      reconnectionDelayMax: 5000
    });

    let stream = null;
    let canvas = null;
    let ctx = null;
    let interval = null;

    // Runs EVERY time connection is established (initial + reconnect)
    socket.on("connect", async () => {
      console.log("Connected to server");

      // Register camera on every connection/reconnection
      socket.emit("register", "camera");

      // Only initialize camera ONCE
      if (!stream) {
        stream = await navigator.mediaDevices.getUserMedia({ video: true });

        const video = document.getElementById("video");
        video.srcObject = stream;

        canvas = document.createElement("canvas");
        ctx = canvas.getContext("2d");

        startStreaming(video);
      }
    });

    function startStreaming(video) {
      // Prevent duplicate intervals
      if (interval) return;

      interval = setInterval(() => {
        if (!socket.connected) return;
        if (video.readyState !== 4) return;

        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;

        ctx.drawImage(video, 0, 0);

        canvas.toBlob((blob) => {
          if (socket.connected) {
            socket.emit("frame", blob);
          }
        }, "image/jpeg", 0.6);

      }, 100); // ~10 FPS
    }

    socket.on("disconnect", (reason) => {
      console.log("Disconnected:", reason);
    });
  </script>
</body>
</html>
